; PlatformIO project config — CoreS3-Lite Hello World (Issue #3)
; 2環境構成:
;   m5stack-cores3 … 実機ビルド/書き込み (ESP32-S3 + M5Unified)
;   native         … ホストPC上で純粋ロジックの単体テスト (Unity)

[platformio]
default_envs = m5stack-cores3

[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
lib_deps = m5stack/M5Unified
monitor_speed = 115200
; 書き込み/モニタ用ポート（環境に合わせて変更可）
upload_port = COM3
monitor_port = COM3

[env:native]
platform = native
test_framework = unity
; 実機依存の main.cpp は除外し、純粋ロジック(greeting.cpp)だけをテスト対象にする
build_src_filter = +<greeting.cpp>
build_flags = -std=c++11
