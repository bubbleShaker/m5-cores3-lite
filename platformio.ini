; PlatformIO project config — CoreS3-Lite Hello World (Issue #3)
; 3環境構成:
;   m5stack-cores3     … 実機ビルド/書き込み (ESP32-S3 + M5Unified)
;   m5stack-cores3-msc … 転送専用ファーム。microSD を PC のドライブとして見せる (#157)
;   native             … ホストPC上で純粋ロジックの単体テスト (Unity)

[platformio]
default_envs = m5stack-cores3

[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
lib_deps =
    m5stack/M5Unified
    bblanchon/ArduinoJson@^7.2.0
    ; 定番OSS「スタックチャン」の顔描画ライブラリ（#121）。内部でM5GFX(=M5Unified同梱)を使う。
    meganetaaan/M5Stack-Avatar@^0.10.0
monitor_speed = 115200
; 書き込み/モニタ用ポート（環境に合わせて変更可）
upload_port = COM3
monitor_port = COM3
; 転送専用ファーム(msc_main.cpp)は通常ファームに含めない。
; 同一 src/ に setup()/loop() が2つあるとリンクが多重定義で落ちるため明示除外する（#157）。
build_src_filter = +<*> -<msc_main.cpp>

; 転送専用ファーム（#157）。microSD を USB Mass Storage として PC に見せるだけの最小ファーム。
; 通常ファームと env を分ける理由:
;   USBMSC は CONFIG_TINYUSB_MSC_ENABLED 配下にあり ARDUINO_USB_MODE=0（TinyUSB）が要る。
;   しかし TinyUSB では USB をアプリが握るため、アプリが USB.begin() を呼ばないと USB が死に、
;   esptool の自動リセットも効かなくなる（#157 M1 で実測: default_reset / usb_reset とも
;   "No serial data received" で失敗 → 底面 RST 3秒長押しで復旧）。
;   ※ M1 の失敗は USB.begin() を呼ばない main.cpp でのテスト。msc_main.cpp は全経路で呼ぶので
;     自動リセットが効く可能性がある（未検証・M3 で確認）。
;   いずれにせよ通常ファームを USB_MODE=1 のまま残せば、日常の開発サイクルは確実に
;   自動書き込みを維持できる。
;   加えて別ファームなので、PC と本体が同時に SD を掴む競合が構造的に起こらない。
[env:m5stack-cores3-msc]
extends = env:m5stack-cores3
; 転送ファームは msc_main.cpp だけをビルドする（アプリのシーン群は一切含めない）。
build_src_filter = -<*> +<msc_main.cpp>
build_unflags = -DARDUINO_USB_MODE=1
build_flags = -DARDUINO_USB_MODE=0
; TinyUSB は USB PID が 0x8119(ハードウェアCDC/JTAG) → 0x1001 に変わり Windows が別デバイスとして
; 再列挙するため、通常ファームとポート番号がずれる（実測 COM3 → COM4）。環境に合わせて変更する。
upload_port = COM4
monitor_port = COM4

[env:native]
platform = native
test_framework = unity
; 純粋ロジック(net.cpp)が ArduinoJson を使うので native でも取り込む（ヘッダオンリーで動く）。
lib_deps = bblanchon/ArduinoJson@^7.2.0
; pio test 実行時に src/ も一緒にビルドする（build_src_filter で対象を限定）。
; これが無いと純粋ロジック(greeting.cpp/face_logic.cpp)がリンクされず undefined reference になる。
test_build_src = true
; 実機依存の main.cpp は除外し、純粋ロジック(greeting.cpp / face_logic.cpp / sheep.cpp / art.cpp / gesture.cpp / scene.cpp / menu.cpp / voice.cpp / wav.cpp / gem.cpp / gem3d.cpp / pokemon.cpp / volume.cpp / commentary.cpp / voice_select.cpp / envelope.cpp / particles.cpp / pacman.cpp / video.cpp / meta.cpp）だけをテスト対象にする
build_src_filter = +<greeting.cpp> +<face_logic.cpp> +<net.cpp> +<sheep.cpp> +<art.cpp> +<gesture.cpp> +<scene.cpp> +<menu.cpp> +<voice.cpp> +<wav.cpp> +<gem.cpp> +<gem3d.cpp> +<pokemon.cpp> +<volume.cpp> +<commentary.cpp> +<voice_select.cpp> +<envelope.cpp> +<particles.cpp> +<pacman.cpp> +<video.cpp> +<meta.cpp>
build_flags = -std=c++11
